<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دربك أمان - حالة الطرق في اليمن</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .status-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .status-table th, .status-table td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        .status-table th { background-color: #3498db; color: white; }
        .danger-low { color: green; font-weight: bold; }
        .danger-high { color: red; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>🛑 نظام دربك أمان - آخر التقارير</h1>
    <p>مرحباً بك يا أبو غيث.. البيانات تظهر هنا من Firestore.</p>
    <table class="status-table">
        <thead>
            <tr>
                <th>الموقع</th>
                <th>الحالة</th>
                <th>نصيحة الخبير</th>
                <th>مستوى الخطر</th>
            </tr>
        </thead>
        <tbody id="reports-body"></tbody>
    </table>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgdg7cnfyRFrI9J7O3ZpXCBgSQDFbhCU0",
        authDomain: "drbk-aman-346a1.firebaseapp.com",
        projectId: "drbk-aman-346a1",
        storageBucket: "drbk-aman-346a1.firebasestorage.app",
        messagingSenderId: "200126418611",
        appId: "1:200126418611:web:5886550910d2318055eac6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    db.collection("reports").onSnapshot((querySnapshot) => {
        const reportsBody = document.getElementById('reports-body');
        reportsBody.innerHTML = ""; 
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const row = `
                <tr>
                    <td><b>${data.location || 'غير محدد'}</b></td>
                    <td>${data.status || 'لا يوجد وصف'}</td>
                    <td>${data.advice || 'انتبه لطريقك'}</td>
                    <td class="${data.danger_level === 'عالي' ? 'danger-high' : 'danger-low'}">${data.danger_level || 'منخفض'}</td>
                </tr>
            `;
            reportsBody.insertAdjacentHTML('afterbegin', row); 
        });
    });
</script>
</body>
</html>
